# url 里填写自己的订阅,名称不能重复
proxy-providers:
  fny:
    url: ""
    type: http
    interval: 43200
    health-check:
      {
        enable: true,
        url: "https://www.gstatic.com/generate_204",
        interval: 300,
      }
    override:
      additional-prefix: "[fny]"

  pq:
    url: ""
    type: http
    interval: 43200
    health-check:
      {
        enable: true,
        url: "https://www.gstatic.com/generate_204",
        interval: 300,
      }
    override:
      additional-prefix: "[pq]"
  yiyuan:
    url: ""
    type: http
    interval: 43200
    health-check:
      {
        enable: true,
        url: "https://www.gstatic.com/generate_204",
        interval: 300,
      }
    override:
      additional-prefix: "[yiyuan]"

proxies:
  - name: "直连"
    type: direct
    udp: true

mixed-port: 7890
ipv6: true
allow-lan: true
unified-delay: false
tcp-concurrent: true
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

geodata-mode: true
geox-url:
  geoip: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"
  geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

  #geoip: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  #geosite: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  #mmdb: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  #asn: "https://mirror.ghproxy.com/https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

  #geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  #geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  #mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"

find-process-mode: strict
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"
  nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  nameserver-policy:
    "geosite:cn,private":
      - https://120.53.53.53/dns-query
      - https://223.5.5.5/dns-query
    "geosite:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query"
      - "https://dns.google/dns-query"

proxy-groups:
  - name: Google
    url: "http://www.gstatic.com/generate_204"
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 50
    proxies: [新加坡, 美国, 日本]

  - name: Bing
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 50
    proxies: [新加坡, 美国, 日本, 瑞士]

  - name: Proxy
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 50
    include-all: true
    exclude-filter: "(?i)(直连)"

  - name: Steam
    url: 'http://test.steampowered.com'
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true

  - name: 巴哈姆特
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    proxies: [台湾]

  - name: 香港
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong"

  - name: 台湾
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "(?i)台|tw|taiwan"

  - name: 美国
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "(?i)美|us|unitedstates|united states"

  - name: 新加坡
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "(?i)(新加坡|sg|singapore)"

  - name: 日本
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "(?i)(日本|jp|japan)"

  - name: 英国
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "英国"

  - name: 澳大利亚
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "澳大利亚"

  - name: 瑞典
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "瑞典"

  - name: 韩国
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "韩国"

  - name: 迪拜
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "迪拜"

  - name: 瑞士
    type: url-test
    interval: 10
    strategy: sticky-sessions
    tolerance: 100
    include-all: true
    filter: "瑞士"

