# ####################################################################
#        See https://wiki.hyprland.org/Configuring/Monitors/        #
# ####################################################################
# {{{
$inner = eDP-2

monitor = , highres, auto, auto
# monitor = eDP-1, 1920x1080@144, 0x1080, 1
# monitor = eDP-1, 1920x1080@144, auto, 1

# # mirror
# monitor = eDP-1, 1920x1080@144, 1920x0, 1, mirror, HDMI-A-1
monitorv2 {
    output = $inner
    mode = highres
    position = 0x0
    scale = 1.25
    disabled = false
}
monitorv2 {
    output = HDMI-A-1
    mode = highres
    position = auto-right
    scale = 1.5
}

# bindl = , switch:Lid Switch, exec, hyprlock --display $inner
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitorv2[$inner]:disabled true
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitorv2[$inner]:disabled false

# }}}
